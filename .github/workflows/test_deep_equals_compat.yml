name: Test deep_equals downwards compatibility

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 6am UTC

jobs:
  test-compat:
    name: "deep_equals compat - ${{ matrix.name }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # a few months before numpy 2 release (numpy 2.0 was June 2024)
          - name: "numpy-1x-cutoff"
            python-version: "3.10"
            exclude_newer: "2024-01-01"

          # pandas 1.x era
          - name: "pandas-1x-cutoff"
            python-version: "3.10"
            exclude_newer: "2023-01-01"

          # pandas 2.x era (pandas 2.0 was April 2023)
          - name: "pandas-2x-cutoff"
            python-version: "3.10"
            exclude_newer: "2024-06-01"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install skbase with version cutoff
        run: |
          uv pip install --system \
            --exclude-newer ${{ matrix.exclude_newer }} \
            -e ".[all_extras,dev]" numpy pandas

      - name: Show dependencies
        run: python -m pip list

      - name: Run deep_equals tests
        run: |
          python -m pytest skbase/utils/tests/test_deep_equals.py -v
